<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self';"
        />
        <meta name="referrer" content="no-referrer" />
        <meta name="theme-color" content="#2e7d32" />
        <link rel="manifest" href="manifest.json" />

        <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
        <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

        <title>Lernkarten-Bibliothek</title>
        <link rel="stylesheet" href="theme.css" />
        <script src="theme.js"></script>
        <script src="sanitize.js"></script>
        <link rel="stylesheet" href="library.css" />
    </head>
    <body>
        <div class="container">
            <header class="library-header">
                <a href="index.html" class="back-link" title="Zur Startseite">←</a>
                <div class="header-content">
                    <h1 id="library-title">📚 Lernkarten-Bibliothek</h1>
                    <p id="library-subtitle">Wähle ein Deck zum Importieren</p>
                </div>
            </header>

            <div id="loading-state" class="state-message">Lade Bibliothek …</div>
            <div id="error-state" class="state-message hidden"></div>

            <!-- Grid view (default) -->
            <section id="grid-view" class="hidden">
                <div class="search-row">
                    <input
                        type="text"
                        id="library-search"
                        class="library-search-input"
                        placeholder="🔍 Decks durchsuchen …"
                    />
                </div>
                <div id="deck-grid" class="deck-grid"></div>
                <div id="empty-state" class="state-message hidden">
                    Keine Decks in der Bibliothek gefunden.
                </div>
            </section>

            <!-- Detail view (when ?deck=<id>) -->
            <section id="detail-view" class="hidden">
                <button class="btn btn-secondary back-to-grid" id="back-to-grid">
                    ← Zur Übersicht
                </button>
                <div id="detail-content"></div>
            </section>

            <div id="message-banner" class="message-banner hidden"></div>
        </div>

        <script
            defer
            src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
            integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script defer src="library.js"></script>

        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js').catch(() => {});
                });
            }
        </script>
    </body>
</html>
